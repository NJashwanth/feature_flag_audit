name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Actually publish to pub.dev
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pubdev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Decide publish mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          should_publish="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            should_publish="true"
            echo "Automatic publish mode enabled for tag push."
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" == "true" ]]; then
            should_publish="true"
            echo "Manual publish mode enabled."
          else
            echo "Validation-only mode (no pub.dev publish)."
          fi
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d test ]]; then
            dart test
          else
            echo "No test directory found. Skipping tests."
          fi

      - name: Read package metadata
        if: ${{ steps.mode.outputs.should_publish == 'true' }}
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name=$(awk '/^name:/ { print $2; exit }' pubspec.yaml)
          version=$(awk '/^version:/ { print $2; exit }' pubspec.yaml)
          if [[ -z "$name" || -z "$version" ]]; then
            echo "Could not read name/version from pubspec.yaml"
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on pub.dev
        if: ${{ steps.mode.outputs.should_publish == 'true' }}
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          name='${{ steps.package.outputs.name }}'
          version='${{ steps.package.outputs.version }}'
          if curl -fsS "https://pub.dev/api/packages/$name/versions/$version" >/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $version is already published for $name. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $version is not on pub.dev yet. Proceeding."
          fi

      - name: Restore pub.dev credentials
        if: ${{ false }}
        run: echo "Not used with Trusted Publishing"

      - name: Publish package
        if: ${{ steps.mode.outputs.should_publish == 'true' && steps.version_check.outputs.already_published == 'false' }}
        run: dart pub publish --force